<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Categories - LRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js?v=3.5"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js?v=3.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/logo.png" alt="GSCS Logo">
        </div>

        <nav class="sidebar-nav" id="mainNav">
            <a href="index.html" class="nav-link">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="calendar.html" class="nav-link">
                <i data-lucide="calendar"></i> Calendar
            </a>
            <a href="bulk-messenger.html" class="nav-link">
                <i data-lucide="send"></i> Bulk Messenger
            </a>
            <a href="reminders.html" class="nav-link">
                <i data-lucide="bell"></i> Reminders
            </a>
            <a href="categories.html" class="nav-link active">
                <i data-lucide="layers"></i> Categories
            </a>
            <a href="calculator.html" class="nav-link">
                <i data-lucide="calculator"></i> Calculator
            </a>
            <a href="legal-actions.html" class="nav-link">
                <i data-lucide="scale"></i> Legal Actions
            </a>
            <a href="closed-loans.html" class="nav-link">
                <i data-lucide="archive"></i> Closed Loans
            </a>
            <a href="reports.html" class="nav-link">
                <i data-lucide="file-bar-chart"></i> Reports
            </a>
            <a href="activity-log.html" class="nav-link">
                <i data-lucide="list"></i> Activity Log
            </a>
            <hr class="nav-divider">
            <a href="recycle-bin.html" class="nav-link">
                <i data-lucide="trash-2"></i> Recycle Bin
            </a>
            <a href="admin.html" id="adminMenuLink" class="nav-link admin-only hidden">
                <i data-lucide="users"></i> User Management
            </a>
            <a href="settings.html" id="settingsMenuLink" class="nav-link admin-only hidden">
                <i data-lucide="settings"></i> Settings
            </a>
        </nav>

        <div class="sidebar-bottom">
            <button onclick="handleBackup()" class="sidebar-bottom-btn">
                <i data-lucide="download-cloud" style="width:16px;height:16px;color:#6ee7b7;flex-shrink:0"></i>
                Backup Data
            </button>
            <div style="position:relative">
                <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="handleRestore(event)">
                <button onclick="document.getElementById('restoreFile').click()" class="sidebar-bottom-btn">
                    <i data-lucide="upload-cloud" style="width:16px;height:16px;color:#fcd34d;flex-shrink:0"></i>
                    Restore Data
                </button>
            </div>
            <div class="sidebar-footer">
                <span class="sidebar-version" id="sidebarVersion">GSCS BANK v1.0</span>
                <button onclick="handleLogout()" class="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width:16px;height:16px"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <button class="mobile-toggle" onclick="toggleSidebar()">
                <i data-lucide="menu"></i>
            </button>
            <div>
                <h2>Loan Categories</h2>
                <p>Manage and group different loan types</p>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area">
            <div id="loading" style="text-align:center;padding:100px;color:#7c3aed">
                <i data-lucide="loader-2" class="animate-spin" style="width:40px;height:40px"></i>
            </div>

            <div id="categoriesGrid"
                style="display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:24px"
                class="hidden">
                <!-- Data populated here -->
            </div>
        </div>
    </main>

    <script src="js/app.js?v=3.5"></script>
    <script>
        window.initPage = () => {
            lucide.createIcons();
            if (sessionStorage.getItem('lrms_role') === 'admin') {
                document.getElementById('adminMenuLink')?.classList.remove('hidden');
                document.getElementById('settingsMenuLink')?.classList.remove('hidden');
            }
            setTimeout(fetchAndGroupCategories, 150);
        };

        async function fetchAndGroupCategories() {
            try {
                const allCust = await getAllCustomers();
                const activeCust = allCust.filter(c => c.status !== 'Loan Closed');
                const grouped = {};

                activeCust.forEach(c => {
                    const cat = c.category || 'Uncategorized';
                    if (!grouped[cat]) {
                        grouped[cat] = {
                            name: cat,
                            count: 0,
                            totalAmount: 0,
                            customers: []
                        };
                    }
                    grouped[cat].count += 1;
                    grouped[cat].totalAmount += (c.loanAmount || 0);
                    grouped[cat].customers.push(c);
                });
                renderCategories(Object.values(grouped));
            } catch (err) { console.error(err); }
        }

        function renderCategories(catArray) {
            document.getElementById('loading').classList.add('hidden');
            const grid = document.getElementById('categoriesGrid');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            if (catArray.length === 0) {
                grid.innerHTML = `<div class="card" style="grid-column:1/-1;padding:60px;text-align:center;color:#9ca3af;font-style:italic">No active loans found.</div>`;
                return;
            }

            // Sort by highest value 
            catArray.sort((a, b) => b.totalAmount - a.totalAmount);

            catArray.forEach(cat => {
                const colors = ['violet', 'amber', 'emerald', 'red'];
                const color = colors[cat.name.length % colors.length];

                const preview = cat.customers.slice(0, 3).map(c => `
                    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                        <div style="width:4px;height:4px;border-radius:50%;background:var(--violet-400)"></div>
                        <div style="font-size:0.75rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                            ${c.name} <span style="opacity:0.6">(${c.accountNo})</span>
                        </div>
                    </div>`).join('');

                const hiddenCount = cat.count > 3 ? `<div style="font-size:0.7rem;color:var(--text-muted);font-weight:600;margin-top:8px;padding-left:12px">+ ${cat.count - 3} more...</div>` : '';

                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.onclick = () => window.location.href = `index.html`;

                card.innerHTML = `
                    <div class="card-header" style="border-bottom:none;padding-bottom:0">
                        <div>
                            <h3 style="font-size:1.1rem;font-weight:800;color:var(--text-primary)">${cat.name}</h3>
                            <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:700;color:var(--text-secondary);margin-top:4px">
                                <i data-lucide="users" style="width:14px;height:14px"></i> ${cat.count} Customers
                            </div>
                        </div>
                        <div class="stat-icon ${color}" style="width:48px;height:48px;border-radius:14px">
                            <i data-lucide="layers" style="width:24px;height:24px"></i>
                        </div>
                    </div>
                    <div class="card-body" style="padding-top:10px">
                        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
                            <p style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:2px">Total Exposure</p>
                            <p style="font-family:'Poppins',sans-serif;font-size:1.25rem;font-weight:800;color:var(--text-primary)">
                                LKR ${cat.totalAmount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                            </p>
                        </div>
                        <div style="padding-left:4px">
                            ${preview}
                            ${hiddenCount}
                        </div>
                    </div>
                    <div style="background:var(--violet-50);padding:10px 24px;display:flex;align-items:center;justify-content:flex-end;font-size:0.8rem;font-weight:700;color:var(--violet-700);border-top:1px solid var(--violet-100)">
                        See Dashboard <i data-lucide="arrow-right" style="width:14px;height:14px;margin-left:6px"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>

</html>
