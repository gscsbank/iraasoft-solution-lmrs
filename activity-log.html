<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log - LRMS</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js?v=3.5"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js?v=3.3"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js?v=3.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .log-type-info {
            background: #e0f2fe;
            color: #0369a1;
        }

        .log-type-success {
            background: #dcfce7;
            color: #15803d;
        }

        .log-type-warning {
            background: #fef3c7;
            color: #b45309;
        }

        .log-type-danger {
            background: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/logo.png" alt="GSCS Logo">
        </div>
        <nav class="sidebar-nav" id="mainNav">
            <a href="index.html" class="nav-link">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="calendar.html" class="nav-link">
                <i data-lucide="calendar"></i> Calendar
            </a>
            <a href="bulk-messenger.html" class="nav-link">
                <i data-lucide="send"></i> Bulk Messenger
            </a>
            <a href="reminders.html" class="nav-link">
                <i data-lucide="bell"></i> Reminders
            </a>
            <a href="categories.html" class="nav-link">
                <i data-lucide="layers"></i> Categories
            </a>
            <a href="calculator.html" class="nav-link">
                <i data-lucide="calculator"></i> Calculator
            </a>
            <a href="legal-actions.html" class="nav-link">
                <i data-lucide="scale"></i> Legal Actions
            </a>
            <a href="closed-loans.html" class="nav-link">
                <i data-lucide="archive"></i> Closed Loans
            </a>
            <a href="reports.html" class="nav-link">
                <i data-lucide="file-bar-chart"></i> Reports
            </a>
            <a href="activity-log.html" class="nav-link active">
                <i data-lucide="list"></i> Activity Log
            </a>
            <hr class="nav-divider">
            <a href="recycle-bin.html" class="nav-link">
                <i data-lucide="trash-2"></i> Recycle Bin
            </a>
            <a href="admin.html" id="adminMenuLink" class="nav-link admin-only hidden">
                <i data-lucide="users"></i> User Management
            </a>
            <a href="settings.html" id="settingsMenuLink" class="nav-link admin-only hidden">
                <i data-lucide="settings"></i> Settings
            </a>
        </nav>
        <div class="sidebar-bottom">
            <button onclick="handleBackup()" class="sidebar-bottom-btn">
                <i data-lucide="download-cloud" style="width:16px;height:16px;color:#6ee7b7;flex-shrink:0"></i>
                Backup Data
            </button>
            <div style="position:relative">
                <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="handleRestore(event)">
                <button onclick="document.getElementById('restoreFile').click()" class="sidebar-bottom-btn">
                    <i data-lucide="upload-cloud" style="width:16px;height:16px;color:#fcd34d;flex-shrink:0"></i>
                    Restore Data
                </button>
            </div>
            <div class="sidebar-footer">
                <span class="sidebar-version" id="sidebarVersion">GSCS BANK v1.0</span>
                <button onclick="handleLogout()" class="logout-btn" title="Logout">
                    <i data-lucide="log-out" style="width:16px;height:16px"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <div style="display:flex;align-items:center;gap:16px">
                <button class="mobile-toggle" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <div>
                    <h2>System Activity Log</h2>
                    <p>Monitor all actions performed in the system</p>
                </div>
            </div>
            <div style="display:flex;gap:10px">
                <button onclick="handleClearLogs()" class="btn btn-ghost" style="color:#ef4444">
                    <i data-lucide="trash-2"></i> Clear All Logs
                </button>
                <button onclick="refreshLogs()" class="btn btn-primary">
                    <i data-lucide="refresh-cw"></i> Refresh
                </button>
            </div>
        </header>

        <div class="content-area">
            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Action</th>
                                    <th>Details</th>
                                    <th>Type</th>
                                    <th style="text-align:right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="logsBody">
                                <tr>
                                    <td colspan="5" style="text-align:center;padding:40px;color:#94a3b8">Loading
                                        activity logs...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
            </div>
        </div>

        <script>
            {
                window.initPage = () => {
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                    refreshLogs();
                };

                window.refreshLogs = async function() {
                    const tbody = document.getElementById('logsBody');
                    if (!tbody) return;
                    
                    const logs = await getActivityLogs(100);

                    if (logs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#94a3b8">No activities recorded yet.</td></tr>';
                        return;
                    }

                    tbody.innerHTML = '';
                    logs.forEach(log => {
                        const date = new Date(log.timestamp);
                        const timeStr = date.toLocaleString();

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-size:0.85rem;color:#64748b;white-space:nowrap">${timeStr}</td>
                            <td style="font-weight:700;color:#1e1b4b">${log.action}</td>
                            <td style="color:#475569;font-size:0.9rem">${log.details}</td>
                            <td>
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider log-type-${log.type}">
                                    ${log.type}
                                </span>
                            </td>
                            <td style="text-align:right">
                                <button onclick="handleDeleteLog('${log.id}')" class="text-red-400 hover:text-red-600 transition-colors">
                                    <i data-lucide="x-circle" style="width:18px;height:18px"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }

                window.handleDeleteLog = async function(id) {
                    if (await deleteActivityLog(id)) {
                        refreshLogs();
                    }
                }

                window.handleClearLogs = async function() {
                    if (confirm("Are you sure you want to clear ALL activity logs? This cannot be undone.")) {
                        if (await clearAllLogs()) {
                            refreshLogs();
                        }
                    }
                }

                // Initial run if already loaded
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    window.initPage();
                }
            }
        </script>
    </main>


</body>

</html>
